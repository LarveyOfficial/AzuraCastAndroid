name: Release Please

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

# Serialize runs so the rolling "nightly" pre-release is never created and
# deleted by two overlapping main pushes at once.
concurrency:
  group: release-please-main
  cancel-in-progress: false

jobs:
  # 1. Maintain the release PR and, when it merges, cut the tag + GitHub Release.
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  # 2a. A real release was just cut (the release-please PR merged): build the
  #     signed APK + AAB, attach the APK to the public Release, push the AAB to
  #     Play internal, and delete the rolling pre-release so the stable release
  #     is unambiguously the newest.
  release-artifacts:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history so the commit-count versionCode is correct.
          fetch-depth: 0

      - name: Compute versionCode from commit count
        id: vc
        run: echo "version_code=$(( $(git rev-list --count HEAD) + 75 ))" >> "$GITHUB_OUTPUT"

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Decode signing keystore
        env:
          SIGNING_KEYSTORE: ${{ secrets.SIGNING_KEYSTORE }}
        run: echo "$SIGNING_KEYSTORE" | base64 --decode > "$RUNNER_TEMP/release.keystore"

      - name: Build signed release APK + AAB
        env:
          VERSION_CODE: ${{ steps.vc.outputs.version_code }}
          SIGNING_KEYSTORE_PATH: ${{ runner.temp }}/release.keystore
          SIGNING_KEYSTORE_PASSWORD: ${{ secrets.SIGNING_KEYSTORE_PASSWORD }}
          SIGNING_KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS }}
          SIGNING_KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD }}
        run: ./gradlew assembleRelease bundleRelease --no-daemon

      # --- Public: APK on the GitHub Release ---
      - name: Attach APK to the GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ needs.release-please.outputs.tag_name }}" \
            app/build/outputs/apk/release/app-release.apk \
            --clobber

      # --- Private: AAB straight to Play Console internal testing track ---
      - name: Upload AAB to Play Console (internal track)
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: com.larvey.azuracastplayer
          releaseFiles: app/build/outputs/bundle/release/app-release.aab
          track: internal
          status: completed

      # --- Retire the rolling pre-release: the stable release is now newest ---
      - name: Delete the rolling pre-release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release delete nightly --cleanup-tag --yes || true

  # 2b. A normal (non-release) merge to main: build the signed release APK and
  #     publish/refresh a single rolling "nightly" pre-release pointing at the
  #     latest commit. Pre-releases are never marked "Latest" by GitHub, so a
  #     real release always outranks this.
  prerelease:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created != 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history so the commit-count versionCode is correct.
          fetch-depth: 0

      - name: Compute versionCode from commit count
        id: vc
        run: echo "version_code=$(( $(git rev-list --count HEAD) + 75 ))" >> "$GITHUB_OUTPUT"

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Decode signing keystore
        env:
          SIGNING_KEYSTORE: ${{ secrets.SIGNING_KEYSTORE }}
        run: echo "$SIGNING_KEYSTORE" | base64 --decode > "$RUNNER_TEMP/release.keystore"

      - name: Build signed release APK
        env:
          VERSION_CODE: ${{ steps.vc.outputs.version_code }}
          SIGNING_KEYSTORE_PATH: ${{ runner.temp }}/release.keystore
          SIGNING_KEYSTORE_PASSWORD: ${{ secrets.SIGNING_KEYSTORE_PASSWORD }}
          SIGNING_KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS }}
          SIGNING_KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD }}
        run: ./gradlew assembleRelease --no-daemon

      - name: Name the pre-release APK distinctly
        run: cp app/build/outputs/apk/release/app-release.apk AzuraCast-nightly.apk

      - name: Publish / refresh the rolling pre-release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Move the single "nightly" pre-release to the new commit.
          gh release delete nightly --cleanup-tag --yes || true
          gh release create nightly \
            AzuraCast-nightly.apk \
            --prerelease \
            --target "$GITHUB_SHA" \
            --title "Nightly build (main)" \
            --notes "Automated pre-release built from the latest commit on \`main\` (\`${GITHUB_SHA:0:7}\`). Not an official release — for stable builds see the Releases page."
