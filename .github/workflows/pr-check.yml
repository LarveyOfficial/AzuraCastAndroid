name: PR Checks

on:
  pull_request:
    branches:
      - main

# Cancel an in-progress run when the PR gets new commits.
concurrency:
  group: pr-checks-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Assemble debug
        run: ./gradlew assembleDebug --no-daemon

      # Build the release variant too (unsigned here — no signing env is set on PRs),
      # so R8/minify + resource shrinking run and catch missing ProGuard keep rules
      # that the debug build would never surface.
      - name: Assemble release (unsigned, exercises R8/minify)
        run: ./gradlew assembleRelease --no-daemon

      - name: Android Lint
        run: ./gradlew lintDebug --no-daemon

      - name: Unit tests
        run: ./gradlew testDebugUnitTest --no-daemon
