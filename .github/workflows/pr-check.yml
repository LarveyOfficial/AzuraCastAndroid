name: PR Checks

on:
  pull_request:
    branches:
      - main
    # ready_for_review lets the checks fire the moment a draft is un-drafted.
    types: [opened, synchronize, reopened, ready_for_review]

# Cancel an in-progress run when the PR gets new commits.
concurrency:
  group: pr-checks-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  unit-tests:
    name: Unit Tests
    # Skip everything on draft PRs; runs once the PR is marked ready for review.
    if: ${{ github.event.pull_request.draft == false }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
      - name: Unit tests
        run: ./gradlew testDebugUnitTest --no-daemon

  lint:
    name: Lint
    if: ${{ github.event.pull_request.draft == false }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
      - name: Android Lint
        run: ./gradlew lintDebug --no-daemon

  debug-build:
    name: Debug Build
    if: ${{ github.event.pull_request.draft == false }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write # to post/update the APK download comment
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
      - name: Assemble debug
        run: ./gradlew assembleDebug --no-daemon
      - name: Upload debug APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
      - name: Comment debug APK download link
        uses: actions/github-script@v7
        with:
          script: |
            const marker = '<!-- pr-debug-apk -->';
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const sha = context.payload.pull_request.head.sha.substring(0, 7);
            const body = [
              marker,
              '### 📦 Debug APK',
              `Built from \`${sha}\`.`,
              '',
              `Download it from the **[workflow run artifacts](${runUrl})** — the \`app-debug-apk\` artifact at the bottom of that page.`,
              '',
              '_Rebuilt on every push; artifacts expire after 90 days. Debug-signed — not for release._',
            ].join('\n');
            const { owner, repo } = context.repo;
            const issue_number = context.payload.pull_request.number;
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner, repo, issue_number,
            });
            const existing = comments.find((c) => c.body && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body });
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number, body });
            }

  release-build:
    name: Release Build
    if: ${{ github.event.pull_request.draft == false }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
      # Unsigned here (no signing env on PRs) but still runs R8/minify +
      # resource shrinking, so missing ProGuard keep rules fail the PR.
      - name: Assemble release (unsigned, exercises R8/minify)
        run: ./gradlew assembleRelease --no-daemon
