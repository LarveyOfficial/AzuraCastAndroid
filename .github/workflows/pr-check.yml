name: PR Checks

on:
  pull_request:
    branches:
      - main
    # ready_for_review lets the checks fire the moment a draft is un-drafted.
    types: [opened, synchronize, reopened, ready_for_review]

# Cancel an in-progress run when the PR gets new commits.
concurrency:
  group: pr-checks-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

jobs:
  # Decide which checks are worth running for this PR, purely by which files
  # changed (not what changed inside them):
  #   code  = app sources / build config / ProGuard / gradle → build inputs
  #   tests = app/src/test or androidTest
  # Docs-only PRs (READMEs, screenshots, release-please metadata, etc.) set both
  # false, so every downstream job skips. A skipped required check is treated as
  # passing by branch protection, so the PR stays mergeable — this is why the
  # gating lives in per-job `if:`, NOT a workflow-level `paths:` filter (that
  # would stop the checks from ever reporting and block the PR forever).
  changes:
    name: Detect changes
    if: ${{ github.event.pull_request.draft == false }}
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.filter.outputs.code }}
      tests: ${{ steps.filter.outputs.tests }}
    steps:
      - name: Classify changed files
        id: filter
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          # Fail open: if we can't list the diff, run everything.
          if ! files=$(gh pr diff "$PR" -R "$REPO" --name-only); then
            echo "Could not read PR diff — running all checks."
            echo "code=true"  >> "$GITHUB_OUTPUT"
            echo "tests=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "Changed files:"; printf '%s\n' "$files"
          code=false
          tests=false
          while IFS= read -r f; do
            [ -z "$f" ] && continue
            case "$f" in
              app/src/test/*|app/src/androidTest/*)
                tests=true ;;
              app/src/main/*|\
              app/build.gradle.kts|build.gradle.kts|settings.gradle.kts|\
              gradle.properties|gradle/libs.versions.toml|gradle/wrapper/*|\
              gradlew|gradlew.bat|app/proguard-rules.pro|app/libs/*)
                code=true ;;
            esac
          done <<< "$files"
          echo "Result: code=$code tests=$tests"
          echo "code=$code"   >> "$GITHUB_OUTPUT"
          echo "tests=$tests" >> "$GITHUB_OUTPUT"

  # Runs when app code OR test code changed (code can break existing tests).
  unit-tests:
    name: Unit Tests
    needs: changes
    if: ${{ needs.changes.outputs.code == 'true' || needs.changes.outputs.tests == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
      - name: Unit tests
        run: ./gradlew testDebugUnitTest --no-daemon

  # Lint + both builds only care about build inputs — they skip a test-only PR.
  lint:
    name: Lint
    needs: changes
    if: ${{ needs.changes.outputs.code == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
      - name: Android Lint
        run: ./gradlew lintDebug --no-daemon

  debug-build:
    name: Debug Build
    needs: changes
    if: ${{ needs.changes.outputs.code == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write # to post/update the APK download comment
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
      - name: Assemble debug
        run: ./gradlew assembleDebug --no-daemon
      - name: Upload debug APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
      - name: Comment debug APK download link
        uses: actions/github-script@v7
        with:
          script: |
            const marker = '<!-- pr-debug-apk -->';
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const sha = context.payload.pull_request.head.sha.substring(0, 7);
            const body = [
              marker,
              '### 📦 Debug APK',
              `Built from \`${sha}\`.`,
              '',
              `Download it from the **[workflow run artifacts](${runUrl})** — the \`app-debug-apk\` artifact at the bottom of that page.`,
              '',
              '_Rebuilt on every push; artifacts expire after 90 days. Debug-signed — not for release._',
            ].join('\n');
            const { owner, repo } = context.repo;
            const issue_number = context.payload.pull_request.number;
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner, repo, issue_number,
            });
            const existing = comments.find((c) => c.body && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body });
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number, body });
            }

  release-build:
    name: Release Build
    needs: changes
    if: ${{ needs.changes.outputs.code == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
      # Unsigned here (no signing env on PRs) but still runs R8/minify +
      # resource shrinking, so missing ProGuard keep rules fail the PR.
      - name: Assemble release (unsigned, exercises R8/minify)
        run: ./gradlew assembleRelease --no-daemon
