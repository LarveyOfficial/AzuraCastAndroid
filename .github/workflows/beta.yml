name: Beta Build

# Opt-in beta builds. Two ways to trigger:
#  - Merge a PR into main that carried the "beta" label.
#  - Run this workflow manually (Actions → Beta Build → Run workflow) to queue
#    the current state of main as a beta.
#
# Runs on `push` to main (NOT the pull_request event) so the run attaches to the
# merge commit and shows up in that commit's checks list — a pull_request run
# attaches to the PR branch head, which is gone after a squash merge, so it never
# appeared on the main commit. Because push events don't carry PR labels, the
# `gate` job looks up the PR associated with the pushed commit and only lets the
# build proceed when that PR had the "beta" label (manual dispatch always proceeds).
#
# Each eligible run builds a signed, beta-versioned APK + AAB and:
#  - publishes/refreshes a GitHub *pre-release* named like the Play release
#    (e.g. "1.3.0-beta"), marked pre-release, with the APK attached — reusing the
#    same tag on later builds so there is one rolling pre-release per beta version,
#  - uploads the AAB to the Play internal track as a DRAFT (nothing goes live until
#    you publish/promote it in the console),
#  - uploads the APK as a run artifact too.
on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

# Serialize so two beta builds never race on the same versionCode / track / tag.
concurrency:
  group: beta-build
  cancel-in-progress: false

jobs:
  # Decide whether this push should produce a beta. Kept as its own fast,
  # checkout-free job so it always reports on the commit even when the build is
  # skipped, and so the heavy build job can gate on it via `needs`.
  gate:
    runs-on: ubuntu-latest
    outputs:
      run_beta: ${{ steps.check.outputs.run_beta }}
    steps:
      - name: Determine beta eligibility
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Manual runs are always intentional betas.
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "run_beta=true" >> "$GITHUB_OUTPUT"
            echo "Manual dispatch — building beta."
            exit 0
          fi
          # Push to main: find the PR that produced this commit and check its labels.
          LABELS=$(gh api "repos/${{ github.repository }}/commits/${{ github.sha }}/pulls" \
            --jq '.[].labels[].name' 2>/dev/null || true)
          if printf '%s\n' "$LABELS" | grep -qx 'beta'; then
            echo "run_beta=true" >> "$GITHUB_OUTPUT"
            echo "PR for this commit is labeled 'beta' — building beta."
          else
            echo "run_beta=false" >> "$GITHUB_OUTPUT"
            echo "No 'beta' label on the PR for this commit — skipping beta build."
          fi

  beta:
    name: Beta Build
    needs: gate
    if: ${{ needs.gate.outputs.run_beta == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write # create/refresh the pre-release
      pull-requests: read # read release-please's open PR for the version
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          # Full history so `git rev-list --count` yields the true commit count.
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Compute beta version
        id: ver
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Beta = a build of the UPCOMING release. Read that version from
          # release-please's open release PR; fall back to the manifest (the
          # last released version) when no release is pending.
          NEXT=$(gh pr list --state open --json title,headRefName \
            --jq '.[] | select(.headRefName | startswith("release-please")) | .title' 2>/dev/null \
            | grep -oE '[0-9]+\.[0-9]+\.[0-9]+' | head -1 || true)
          if [ -z "$NEXT" ]; then
            NEXT=$(python3 -c "import json; print(json.load(open('.release-please-manifest.json'))['.'])")
          fi
          COMMITS=$(git rev-list --count HEAD)
          echo "version_name=${NEXT}-beta" >> "$GITHUB_OUTPUT"
          echo "version_code=$((COMMITS + 75))" >> "$GITHUB_OUTPUT"
          echo "Beta ${NEXT}-beta (versionCode $((COMMITS + 75)))"

      - name: Decode signing keystore
        env:
          SIGNING_KEYSTORE: ${{ secrets.SIGNING_KEYSTORE }}
        run: echo "$SIGNING_KEYSTORE" | base64 --decode > "$RUNNER_TEMP/release.keystore"

      - name: Build signed beta APK + AAB
        env:
          VERSION_NAME_OVERRIDE: ${{ steps.ver.outputs.version_name }}
          VERSION_CODE: ${{ steps.ver.outputs.version_code }}
          SIGNING_KEYSTORE_PATH: ${{ runner.temp }}/release.keystore
          SIGNING_KEYSTORE_PASSWORD: ${{ secrets.SIGNING_KEYSTORE_PASSWORD }}
          SIGNING_KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS }}
          SIGNING_KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD }}
        run: ./gradlew assembleRelease bundleRelease --no-daemon

      - name: Name the beta APK distinctly
        env:
          VERSION_NAME: ${{ steps.ver.outputs.version_name }}
        run: cp app/build/outputs/apk/release/app-release.apk "AzuraCast-${VERSION_NAME}.apk"

      - name: Upload beta APK artifact (sideload copy)
        uses: actions/upload-artifact@v4
        with:
          name: azuracast-beta-${{ steps.ver.outputs.version_name }}
          path: AzuraCast-${{ steps.ver.outputs.version_name }}.apk
          if-no-files-found: error

      - name: Publish / refresh the beta pre-release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.ver.outputs.version_name }}
          VERSION_CODE: ${{ steps.ver.outputs.version_code }}
        run: |
          # One rolling pre-release per upcoming beta version (e.g. "1.3.0-beta").
          # If it already exists (an earlier beta build of the same version),
          # delete it first so the tag + attached APK move to this newest commit —
          # net effect: the pre-release is updated in place with the latest APK.
          gh release delete "$TAG" --cleanup-tag --yes || true
          gh release create "$TAG" \
            "AzuraCast-${TAG}.apk" \
            --prerelease \
            --target "$GITHUB_SHA" \
            --title "$TAG" \
            --notes "Beta build of the upcoming release, from \`${GITHUB_SHA:0:7}\` (versionCode ${VERSION_CODE}). Pre-release for testers — not an official release; see the Releases page for stable builds."

      - name: Upload beta AAB to Play internal (draft)
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: com.larvey.azuracastplayer
          releaseFiles: app/build/outputs/bundle/release/app-release.aab
          track: internal
          status: draft
          releaseName: ${{ steps.ver.outputs.version_name }}
